name: Wasm Build

on:
  push:
    paths:
      - '.github/workflows/wasm-build.yaml'
      - 'CMakeLists.txt'
      - 'CMakeModules/**'
      - 'libs/**'
      - 'src/platforms/emscripten/**'
      - 'src/libAtomVM/**'
  pull_request:
    paths:
      - '.github/workflows/wasm-build.yaml'
      - 'CMakeLists.txt'
      - 'CMakeModules/**'
      - 'libs/**'
      - 'src/platforms/emscripten/**'
      - 'src/libAtomVM/**'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref != 'refs/heads/main' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:

  compile_tests:

    runs-on: ubuntu-24.04
    container: erlang:28
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["c-cpp"]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install required packages
      run: apt update && apt install -y gperf zlib1g-dev cmake ninja-build

    - name: "Git config safe.directory for codeql"
      run: git config --global --add safe.directory /__w/AtomVM/AtomVM

    - name: "Initialize CodeQL"
      uses: github/codeql-action/init@v4
      with:
        languages: ${{matrix.language}}
        build-mode: manual
        queries: +./code-queries/term-to-non-term-func.ql,./code-queries/non-term-to-term-func.ql,./code-queries/mismatched-atom-string-length.ql,./code-queries/mismatched-free-type.ql,./code-queries/term-use-after-gc.ql,./code-queries/allocations-exceeding-ensure-free.ql,./code-queries/allocations-without-ensure-free.ql

    - name: Compile AtomVM and test modules
      run: |
        set -e
        mkdir build
        cd build
        cmake .. -G Ninja -DAVM_WARNINGS_ARE_ERRORS=ON
        # test_eavmlib does not work with wasm due to http + ssl test
        ninja AtomVM atomvmlib atomvmlib-emscripten erlang_test_modules test_etest test_alisp test_estdlib hello_world run_script call_cast html5_events wasm_webserver

    - name: "Perform CodeQL Analysis"
      uses: github/codeql-action/analyze@v4

    - name: Upload AtomVM and test modules
      uses: actions/upload-artifact@v4
      with:
        name: atomvm-and-test-modules
        path: |
            build/**/*.avm
            build/**/*.beam
            build/src/AtomVM
        retention-days: 1

    - name: Compile emscripten test modules
      run: |
        set -e
        cd src/platforms/emscripten
        mkdir -p build/tests/src/
        cd build/tests/src
        cmake ../../../tests/src -G Ninja
        ninja emscripten_erlang_test_modules

    - name: Upload emscripten test modules
      uses: actions/upload-artifact@v4
      with:
        name: emscripten-test-modules
        path: |
            src/platforms/emscripten/build/**/*.beam
        retention-days: 1

  compile_tests_jit:

    runs-on: ubuntu-24.04
    container: erlang:28

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install required packages
      run: apt update && apt install -y gperf zlib1g-dev cmake ninja-build

    - name: Compile AtomVM and test modules with JIT for wasm32
      run: |
        set -e
        mkdir build
        cd build
        cmake .. -G Ninja -DAVM_DISABLE_JIT=OFF -DAVM_JIT_TARGET_ARCH=wasm32 -DAVM_PRECOMPILED_TARGETS=wasm32
        # test_eavmlib does not work with wasm due to http + ssl test
        ninja atomvmlib-emscripten erlang_test_modules test_etest test_alisp test_estdlib hello_world test_jit

    - name: Run JIT eunit tests
      run: |
        cd build
        erl -pa tests/libs/jit/beams/ libs/jit/src/beams/ libs/etest/src/beams \
            -noshell -s tests -s init stop

    - name: Upload JIT test modules
      uses: actions/upload-artifact@v4
      with:
        name: atomvm-and-test-modules-jit
        path: |
            build/**/*.avm
            build/**/*.beam
        retention-days: 1

  wasm_build_and_test_node:
    needs: [compile_tests, compile_tests_jit]
    runs-on: ubuntu-24.04
    container: emscripten/emsdk
    strategy:
      fail-fast: false
      matrix:
        include:
          - jit: ""
            mbedtls_label: "mbedtls3"
            mbedtls_git_tag: "v3.6.3.1"
          - jit: ""
            mbedtls_label: "mbedtls4"
            mbedtls_git_tag: "v4.0.0"
          - jit: "-DAVM_DISABLE_JIT=OFF"
            mbedtls_label: "mbedtls3"
            mbedtls_git_tag: "v3.6.3.1"
          - jit: "-DAVM_DISABLE_JIT=OFF"
            mbedtls_label: "mbedtls4"
            mbedtls_git_tag: "v4.0.0"

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: "Install deps"
      run: sudo apt update -y && sudo apt install -y cmake gperf python3-jinja2 python3-jsonschema

    - name: Build
      shell: bash
      working-directory: ./src/platforms/emscripten/
      run: |
        set -euo pipefail
        mkdir build
        cd build
        emcmake cmake .. ${{ matrix.jit }} -DAVM_FETCH_MBEDTLS_GIT_TAG=${{ matrix.mbedtls_git_tag }}
        emmake make -j

    - name: Download AtomVM and test modules (non-JIT)
      if: matrix.jit == ''
      uses: actions/download-artifact@v4
      with:
        name: atomvm-and-test-modules
        path: build

    - name: Download AtomVM and test modules (JIT)
      if: matrix.jit != ''
      uses: actions/download-artifact@v4
      with:
        name: atomvm-and-test-modules-jit
        path: build

    - name: Test (non-JIT)
      if: matrix.jit == ''
      shell: bash
      working-directory: ./src/platforms/emscripten/build
      run: |
        set -euxo pipefail
        # Test compressed beams
        node src/AtomVM.mjs ../../../../build/examples/erlang/hello_world.beam  ../../../../build/libs/eavmlib/src/eavmlib.avm
        # Run tests that pass
        node src/AtomVM.mjs ../../../../build/tests/libs/alisp/test_alisp.avm
        node src/AtomVM.mjs ../../../../build/tests/libs/estdlib/test_estdlib.avm
        # test_eavmlib does not work with wasm due to http + ssl test
        # node src/AtomVM.mjs ../../../../build/tests/libs/eavmlib/test_eavmlib.avm
        node src/AtomVM.mjs ../../../../build/tests/libs/etest/test_etest.avm
        node src/AtomVM.mjs ../../../../build/tests/erlang_tests/test_crypto.beam

    - name: Test (JIT)
      if: matrix.jit != ''
      shell: bash
      working-directory: ./src/platforms/emscripten/build
      run: |
        set -euxo pipefail
        # Test hello_world with JIT compiler (runtime JIT compilation)
        node src/AtomVM.mjs ../../../../build/examples/erlang/hello_world.beam ../../../../build/libs/atomvmlib-emscripten-wasm32.avm
        # Library tests with JIT compiler (jit-wasm32.avm included in test avms via pack_test)
        node src/AtomVM.mjs ../../../../build/tests/libs/alisp/test_alisp.avm
        node src/AtomVM.mjs ../../../../build/tests/libs/estdlib/test_estdlib.avm
        node src/AtomVM.mjs ../../../../build/tests/libs/etest/test_etest.avm

    - name: "Rename and write sha256sum (node)"
      if: startsWith(github.ref, 'refs/tags/') && matrix.jit == '' && matrix.mbedtls_label == 'mbedtls3'
      shell: bash
      working-directory: src/platforms/emscripten/build/src
      run: |
        ATOMVM_JS=AtomVM-node-${{ github.ref_name }}.mjs
        mv AtomVM.mjs "${ATOMVM_JS}"
        sha256sum "${ATOMVM_JS}" > "${ATOMVM_JS}.sha256"
        ATOMVM_WASM=AtomVM-node-${{ github.ref_name }}.wasm
        mv AtomVM.wasm "${ATOMVM_WASM}"
        sha256sum "${ATOMVM_WASM}" > "${ATOMVM_WASM}.sha256"

    - name: "Release (node)"
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') && matrix.jit == '' && matrix.mbedtls_label == 'mbedtls3'
      with:
        draft: true
        fail_on_unmatched_files: true
        files: |
          src/platforms/emscripten/build/src/AtomVM-node-${{ github.ref_name }}.mjs
          src/platforms/emscripten/build/src/AtomVM-node-${{ github.ref_name }}.mjs.sha256
          src/platforms/emscripten/build/src/AtomVM-node-${{ github.ref_name }}.wasm
          src/platforms/emscripten/build/src/AtomVM-node-${{ github.ref_name }}.wasm.sha256

  wasm_build_web:
    runs-on: ubuntu-24.04
    container: emscripten/emsdk
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - jit: ""
            language: "javascript-typescript"
            mbedtls_label: "mbedtls3"
            mbedtls_git_tag: "v3.6.3.1"
          - jit: ""
            language: "javascript-typescript"
            mbedtls_label: "mbedtls4"
            mbedtls_git_tag: "v4.0.0"
          - jit: "-DAVM_DISABLE_JIT=OFF"
            language: "javascript-typescript"
            mbedtls_label: "mbedtls3"
            mbedtls_git_tag: "v3.6.3.1"
          - jit: "-DAVM_DISABLE_JIT=OFF"
            language: "javascript-typescript"
            mbedtls_label: "mbedtls4"
            mbedtls_git_tag: "v4.0.0"

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: "Install deps"
      run: sudo apt update -y && sudo apt install -y cmake gperf python3-jinja2 python3-jsonschema

    - name: "Initialize CodeQL"
      if: matrix.jit == ''
      uses: github/codeql-action/init@v3
      with:
        languages: ${{matrix.language}}
        build-mode: none
        db-location: '${{ github.runner_temp }}/codeql_js_database'

    - name: Build wasm build for web
      shell: bash
      working-directory: ./src/platforms/emscripten/
      run: |
        set -euo pipefail
        mkdir build
        cd build
        emcmake cmake .. -DAVM_EMSCRIPTEN_ENV=web ${{ matrix.jit }} -DAVM_FETCH_MBEDTLS_GIT_TAG=${{ matrix.mbedtls_git_tag }}
        emmake make -j

    - name: "Perform CodeQL Analysis"
      if: matrix.jit == ''
      uses: github/codeql-action/analyze@v3

    - name: Upload wasm build for web
      if: matrix.jit == ''
      uses: actions/upload-artifact@v4
      with:
        name: atomvm-js-web-${{ matrix.mbedtls_label }}
        path: |
            src/platforms/emscripten/build/**/*.wasm
            src/platforms/emscripten/build/**/*.mjs
        retention-days: 1

  wasm_test_web:
    needs: [compile_tests, wasm_build_web]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - mbedtls_label: "mbedtls3"
          - mbedtls_label: "mbedtls4"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download AtomVM and test modules
      uses: actions/download-artifact@v4
      with:
        name: atomvm-and-test-modules
        path: build

    - name: Download wasm build for web
      uses: actions/download-artifact@v4
      with:
        name: atomvm-js-web-${{ matrix.mbedtls_label }}
        path: src/platforms/emscripten/build

    - name: Download emscripten test modules
      uses: actions/download-artifact@v4
      with:
        name: emscripten-test-modules
        path: src/platforms/emscripten/build

    - name: Start Docker echo server for CI
      run: |
        docker run -d --name echo-server -p 9090:8080 jmalloc/echo-server
        sleep 5

    - name: Test using cypress
      shell: bash
      run: |
        set -euxo pipefail
        cd build
        chmod +x ./src/AtomVM
        ./src/AtomVM examples/emscripten/wasm_webserver.avm &
        cd ../src/platforms/emscripten/tests/
        docker run --network host -v $PWD:/mnt -w /mnt -e CYPRESS_CI=true cypress/included:12.17.1 --browser chrome
        killall AtomVM

    - name: "Publish screenshots of failures"
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: cypress-screenshots
        path: |
            src/platforms/emscripten/tests/cypress/screenshots/**/*.png
        retention-days: 7

    - name: "Rename and write sha256sum (web)"
      if: startsWith(github.ref, 'refs/tags/') && matrix.mbedtls_label == 'mbedtls3'
      shell: bash
      working-directory: src/platforms/emscripten/build/src
      run: |
        ATOMVM_JS=AtomVM-web-${{ github.ref_name }}.mjs
        mv AtomVM.mjs "${ATOMVM_JS}"
        sha256sum "${ATOMVM_JS}" > "${ATOMVM_JS}.sha256"
        ATOMVM_WASM=AtomVM-web-${{ github.ref_name }}.wasm
        mv AtomVM.wasm "${ATOMVM_WASM}"
        sha256sum "${ATOMVM_WASM}" > "${ATOMVM_WASM}.sha256"

    - name: "Release (web)"
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') && matrix.mbedtls_label == 'mbedtls3'
      with:
        draft: true
        fail_on_unmatched_files: true
        files: |
          src/platforms/emscripten/build/src/AtomVM-web-${{ github.ref_name }}.mjs
          src/platforms/emscripten/build/src/AtomVM-web-${{ github.ref_name }}.mjs.sha256
          src/platforms/emscripten/build/src/AtomVM-web-${{ github.ref_name }}.wasm
          src/platforms/emscripten/build/src/AtomVM-web-${{ github.ref_name }}.wasm.sha256
